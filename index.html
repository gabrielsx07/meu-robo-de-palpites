<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Palpites - Resultados</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { background: linear-gradient(90deg, #00ff88, #00bd65); color: black; padding: 20px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; font-size: 24px; text-shadow: 1px 1px 2px rgba(255,255,255,0.3); }
        table { width: 100%; border-collapse: collapse; background: #1a1a1a; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        th { background: #333; color: #00ff88; padding: 15px; text-align: left; text-transform: uppercase; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #2a2a2a; font-size: 15px; }
        tr:hover { background: #252525; }
        .footer { margin-top: 30px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">⚽ MEU ROBÔ DE PALPITES IA</div>
        <div id="tabela-container">Buscando palpites atualizados...</div>
        <div class="footer">Os palpites são gerados automaticamente via API e IA.</div>
    </div>

    <script>
        Papa.parse("palpites.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                if(results.data.length > 0) {
                    let html = "<table><thead><tr>";
                    // Pega os cabeçalhos das colunas
                    Object.keys(results.data[0]).forEach(key => {
                        html += `<th>${key}</th>`;
                    });
                    html += "</tr></thead><tbody>";
                    
                    // Preenche as linhas
                    results.data.forEach(row => {
                        if(row.Liga || row.Confronto) {
                            html += "<tr>";
                            Object.values(row).forEach(val => {
                                html += `<td>${val}</td>`;
                            });
                            html += "</tr>";
                        }
                    });
                    html += "</tbody></table>";
                    document.getElementById("tabela-container").innerHTML = html;
                } else {
                    document.getElementById("tabela-container").innerHTML = "<h3>Nenhum jogo encontrado para hoje. 😴</h3>";
                }
            },
            error: function() {
                document.getElementById("tabela-container").innerHTML = "<h3>Erro ao carregar palpites. Verifique se o arquivo palpites.csv existe.</h3>";
            }
        });
    </script>
</body>
</html>
