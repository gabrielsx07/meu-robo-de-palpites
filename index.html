<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostador PRO - VIP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0f1a; --card: #161b2a; --primary: #00ff88; --text: #ffffff; --dim: #8b949e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: 0 auto; }
        
        .nav-pro { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 25px; }
        .logo { font-weight: 800; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .logo span { color: var(--primary); }

        .game-card { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border: 1px solid #2d334a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header-card { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--dim); font-weight: 700; margin-bottom: 15px; }
        
        .match { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .team { width: 40%; text-align: center; }
        .team img { width: 50px; height: 50px; background: #fff; border-radius: 12px; padding: 6px; margin-bottom: 8px; }
        .team span { display: block; font-size: 0.8rem; font-weight: 700; }
        .vs { font-weight: 900; color: #2d334a; font-size: 0.8rem; }

        /* Grade de Palpites */
        .tips-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            background: #0b0f1a; 
            padding: 12px; 
            border-radius: 14px;
        }
        .tip-item { border-bottom: 1px solid #1c2237; padding: 5px 0; }
        .tip-item:nth-last-child(-n+2) { border-bottom: none; }

        .t-label { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; font-weight: 800; display: block; }
        .t-val { font-size: 0.85rem; color: var(--primary); font-weight: 700; }

        .footer-status { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .conf-label { font-size: 0.7rem; font-weight: 800; color: var(--primary); background: rgba(0, 255, 136, 0.1); padding: 4px 12px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-pro">
        <div class="logo">IA<span>ANALYSIS</span></div>
        <div class="conf-label" style="border: 1px solid var(--primary);">PRO MODE</div>
    </div>

    <div id="lista-jogos"></div>
</div>

<script>
    Papa.parse("palpites.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(res) {
            let html = "";
            res.data.forEach(row => {
                if(!row.Confronto) return;
                const t = row.Confronto.split(" vs ");
                
                html += `
                    <div class="game-card">
                        <div class="header-card">
                            <span><i class="far fa-clock"></i> ${row.Dia} - ${row.Hora}</span>
                            <span style="color: var(--primary)">CONFIRMADO</span>
                        </div>
                        
                        <div class="match">
                            <div class="team">
                                <img src="https://api.dicebear.com/7.x/initials/svg?seed=${t[0]}&backgroundColor=ffffff">
                                <span>${t[0]}</span>
                            </div>
                            <div class="vs">VS</div>
                            <div class="team">
                                <img src="https://api.dicebear.com/7.x/initials/svg?seed=${t[1]}&backgroundColor=ffffff">
                                <span>${t[1]}</span>
                            </div>
                        </div>

                        <div class="tips-grid">
                            <div class="tip-item">
                                <span class="t-label">Vencedor</span>
                                <span class="t-val">${row["Vencedor"]}</span>
                            </div>
                            <div class="tip-item">
                                <span class="t-label">Dupla Chance</span>
                                <span class="t-val">${row["Dupla"]}</span>
                            </div>
                            <div class="tip-item">
                                <span class="t-label">Mercado Gols</span>
                                <span class="t-val">${row["Gols"]}</span>
                            </div>
                            <div class="tip-item">
                                <span class="t-label">Escanteios</span>
                                <span class="t-val">${row["Escanteios"]}</span>
                            </div>
                        </div>

                        <div class="footer-status">
                            <span style="font-size: 0.6rem; color: var(--dim);">CONFIANÇA DO ALGORITMO</span>
                            <div class="conf-label">MÉTRICA ${row.Confianca}</div>
                        </div>
                    </div>
                `;
            });
            document.getElementById("lista-jogos").innerHTML = html;
        }
    });
</script>
</body>
</html>
