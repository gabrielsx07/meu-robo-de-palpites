<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostador PRO - Inteligência Esportiva</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 40px; }
        header { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .brand { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px; }
        .brand span { color: var(--primary); }
        
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }

        .performance-banner {
            background: linear-gradient(135deg, #064e3b 0%, #1e293b 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #10b98133;
            display: flex;
            justify-content: space-between;
        }
        .stat-item h4 { margin: 0; color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; }
        .stat-item p { margin: 5px 0 0; font-size: 1.3rem; font-weight: 800; }

        /* Card Estilizado */
        .game-card {
            background: var(--card);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #334155;
            position: relative;
        }

        .league-tag {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--primary);
            background: #10b98115;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .teams-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .team { width: 40%; text-align: center; }
        .team img { 
            width: 48px; 
            height: 48px; 
            object-fit: contain; 
            background: #fff; /* Fundo branco ajuda a destacar logos transparentes */
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 8px;
        }
        .team span { display: block; font-weight: 600; font-size: 0.85rem; line-height: 1.2; }

        .vs-divider { color: var(--text-dim); font-weight: 900; font-size: 0.7rem; }

        .prediction-footer {
            background: #0f172a;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .label-text { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        .val-text { color: var(--primary); font-weight: 800; font-size: 1rem; }
        .conf-pill { font-size: 0.7rem; font-weight: 800; color: #fff; background: var(--primary); padding: 3px 10px; border-radius: 20px; }
    </style>
</head>
<body>

<header>
    <div class="brand"><i class="fas fa-bolt"></i> APOSTADOR<span>PRO</span></div>
    <div style="color: var(--primary);"><i class="fas fa-shield-virus"></i></div>
</header>

<div class="container">
    <div class="performance-banner">
        <div class="stat-item">
            <h4>Assertividade</h4>
            <p>78%</p>
        </div>
        <div class="stat-item" style="text-align: right;">
            <h4>Profit Mensal</h4>
            <p style="color: var(--primary);">+38.2 u</p>
        </div>
    </div>

    <h3 style="font-size: 0.9rem; margin-bottom: 15px; color: var(--text-dim);">Destaques de Hoje</h3>
    <div id="lista-jogos"></div>
</div>

<script>
    // Função para gerar uma imagem baseada no nome do time caso não tenhamos o logo real
    function getTeamLogo(teamName) {
        return `https://api.dicebear.com/7.x/initials/svg?seed=${teamName}&backgroundColor=f8fafc`;
    }

    Papa.parse("palpites.csv", {
        download: true,
        header: true,
        complete: function(res) {
            let html = "";
            res.data.forEach(row => {
                if(!row.Confronto) return;
                
                const times = row.Confronto.split(" vs ");
                const t1 = times[0].trim();
                const t2 = times[1].trim();
                const liga = row.Liga || "Competição Geral"; // Usa a coluna Liga do seu CSV
                
                // Simula porcentagem já que seu CSV atual ainda não tem a coluna Confianca
                const confValue = Math.floor(Math.random() * (97 - 88) + 88) + "%";

                html += `
                    <div class="game-card">
                        <div class="league-tag">${liga}</div>
                        
                        <div class="teams-container">
                            <div class="team">
                                <img src="${getTeamLogo(t1)}" alt="${t1}">
                                <span>${t1}</span>
                            </div>
                            
                            <div class="vs-divider">VS</div>
                            
                            <div class="team">
                                <img src="${getTeamLogo(t2)}" alt="${t2}">
                                <span>${t2}</span>
                            </div>
                        </div>

                        <div class="prediction-footer">
                            <div>
                                <span class="label-text">Sugestão de Entrada</span>
                                <div class="val-text">${row["Chance Dupla"] || "Analisando..."}</div>
                            </div>
                            <div class="conf-pill">IA ${confValue}</div>
                        </div>
                    </div>
                `;
            });
            document.getElementById("lista-jogos").innerHTML = html;
        }
    });
</script>

</body>
</html>
