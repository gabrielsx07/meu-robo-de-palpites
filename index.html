<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostador PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #10b981; --text: #f8fafc; --dim: #94a3b8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        .header-pro { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-weight: 900; font-size: 1.2rem; }
        .logo span { color: var(--primary); }

        .game-card { 
            background: var(--card); 
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 15px; 
            border: 1px solid #334155; 
        }

        .time-tag { 
            font-size: 0.7rem; 
            font-weight: 700; 
            color: var(--dim); 
            display: flex; 
            gap: 10px; 
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .teams { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .team { width: 42%; text-align: center; }
        .team img { width: 45px; height: 45px; background: #fff; border-radius: 50%; padding: 5px; margin-bottom: 8px; }
        .team span { display: block; font-size: 0.85rem; font-weight: 700; }

        .vs { font-size: 0.6rem; font-weight: 900; color: #334155; background: #0f172a; padding: 5px; border-radius: 50%; }

        .footer-card { 
            background: #0f172a; 
            padding: 12px 15px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .tip-label { font-size: 0.6rem; color: var(--dim); font-weight: 800; text-transform: uppercase; }
        .tip-val { color: var(--primary); font-weight: 900; font-size: 1.1rem; }
        .perc { background: var(--primary); color: #fff; font-size: 0.7rem; font-weight: 800; padding: 3px 8px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-pro">
        <div class="logo">APOSTADOR<span>PRO</span></div>
        <div class="perc" style="background: transparent; border: 1px solid var(--primary); color: var(--primary);">LIVE</div>
    </div>

    <div id="lista-jogos"></div>
</div>

<script>
    Papa.parse("palpites.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(res) {
            let html = "";
            res.data.forEach(row => {
                if(!row.Confronto) return;
                const times = row.Confronto.split(" vs ");
                
                html += `
                    <div class="game-card">
                        <div class="time-tag">
                            <span><i class="far fa-calendar"></i> ${row.Dia}</span>
                            <span><i class="far fa-clock"></i> ${row.Hora}</span>
                        </div>
                        <div class="teams">
                            <div class="team">
                                <img src="https://api.dicebear.com/7.x/initials/svg?seed=${times[0]}&backgroundColor=f8fafc">
                                <span>${times[0]}</span>
                            </div>
                            <div class="vs">VS</div>
                            <div class="team">
                                <img src="https://api.dicebear.com/7.x/initials/svg?seed=${times[1]}&backgroundColor=f8fafc">
                                <span>${times[1]}</span>
                            </div>
                        </div>
                        <div class="footer-card">
                            <div>
                                <span class="tip-label">Entrada Sugerida</span>
                                <div class="tip-val">${row["Chance Dupla"]}</div>
                            </div>
                            <div class="perc">${row.Confianca}</div>
                        </div>
                    </div>
                `;
            });
            document.getElementById("lista-jogos").innerHTML = html;
        }
    });
</script>
</body>
</html>
