name: Rodar Robo Diario

on:
  schedule:
    - cron: '0 11 * * *' # Roda todo dia as 08:00 da manhã
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Dependencias
        run: pip install requests pandas

      - name: Executar Robo
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python bot.py

      - name: Salvar Resultados
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add palpites.csv
          git commit -m "Atualizando palpites" || exit 0
          git push
